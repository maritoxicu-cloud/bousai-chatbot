<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="583" height="456" viewBox="0 0 583 456">
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E088C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9FE8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 黒背景 -->
  <rect width="583" height="456" fill="#000000"/>

  <!-- グラデーション吹き出し（rounded rectangle） -->
  <path d="M 80 50 Q 90 50 100 60 L 200 60 Q 210 60 210 70 L 210 150 Q 210 160 200 160 L 120 160 L 100 190 L 120 160 L 100 160 Q 90 160 90 150 L 90 70 Q 90 60 100 50 Z" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 吹き出し内の「防」の文字（白） -->
  <text x="145" y="115" font-size="60" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="serif">防</text>

  <!-- 駆け込む人のシルエット（白） -->
  <!-- 頭 -->
  <circle cx="280" cy="240" r="25" fill="white" opacity="0.95" stroke="white" stroke-width="3"/>

  <!-- 体 -->
  <line x1="280" y1="265" x2="280" y2="320" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <!-- 左腕（上に広げる） -->
  <line x1="280" y1="280" x2="200" y2="220" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <!-- 右腕（上に広げる） -->
  <line x1="280" y1="280" x2="360" y2="220" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <!-- 左脚（走る動き） -->
  <line x1="280" y1="320" x2="240" y2="400" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <!-- 右脚（走る動き） -->
  <line x1="280" y1="320" x2="320" y2="400" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
</svg>