<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E088C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9FE8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 黒背景 -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- グラデーション吹き出し -->
  <ellipse cx="180" cy="100" rx="70" ry="55" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 吹き出しの尾 -->
  <path d="M 140 150 L 120 200 L 160 170 Z" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 「防」の文字（白、楷書） -->
  <text x="180" y="105" font-size="70" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="serif">防</text>

  <!-- 駆け込む人のシルエット（白） -->

  <!-- 頭（円） -->
  <circle cx="280" cy="260" r="22" fill="white" opacity="0.95" stroke="none"/>

  <!-- 体（短い直線） -->
  <line x1="280" y1="283" x2="280" y2="330" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.95"/>

  <!-- 左腕（上に広げる） -->
  <line x1="280" y1="295" x2="210" y2="240" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.95"/>

  <!-- 右腕（上に広げる） -->
  <line x1="280" y1="295" x2="350" y2="240" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.95"/>

  <!-- 左脚（走る動き） -->
  <line x1="280" y1="330" x2="240" y2="400" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.95"/>

  <!-- 右脚（走る動き） -->
  <line x1="280" y1="330" x2="320" y2="400" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.95"/>
</svg>