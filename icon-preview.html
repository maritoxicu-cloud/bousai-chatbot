<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防災コンシェルジュ - アイコンプレビュー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a0f2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 20px;
        }

        svg {
            max-width: 400px;
            width: 100%;
            height: auto;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 防災コンシェルジュ - アイコンプレビュー</h1>

        <div class="preview-box">
            <svg version="1.1" viewBox="0 0 153.60001 204.8" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#E088C8;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4A9FE8;stop-opacity:1" />
                    </linearGradient>
                </defs>

                <!-- グラデーション吹き出し -->
                <ellipse cx="50" cy="35" rx="30" ry="25" fill="url(#bubbleGradient)" />

                <!-- 吹き出しの尾 -->
                <path d="M 35 55 L 30 75 L 50 60 Z" fill="url(#bubbleGradient)" />

                <!-- 「防」の文字 -->
                <text x="50" y="38" font-size="30" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="serif">防</text>

                <!-- 駆け込む人 -->
                <!-- 頭 -->
                <circle cx="100" cy="80" r="10" fill="white" opacity="0.95" />

                <!-- 体 -->
                <ellipse cx="100" cy="110" rx="11" ry="17" fill="white" opacity="0.95" />

                <!-- 左腕 -->
                <line x1="93" y1="97" x2="120" y2="80" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />
                <line x1="120" y1="80" x2="135" y2="65" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />

                <!-- 右腕 -->
                <line x1="107" y1="97" x2="80" y2="110" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />
                <line x1="80" y1="110" x2="65" y2="140" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />

                <!-- 右脚 -->
                <line x1="105" y1="127" x2="120" y2="165" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />

                <!-- 左脚 -->
                <line x1="95" y1="127" x2="80" y2="150" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />
                <line x1="80" y1="150" x2="70" y2="165" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95" />
            </svg>

            <p>✨ ユーザーが Inkscape で作成したアイコン</p>
            <p>🎨 グラデーション吹き出し（ピンク→水色）+ 駆け込む人のシルエット</p>
        </div>
    </div>
</body>
</html>
