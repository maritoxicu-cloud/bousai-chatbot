<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E088C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9FE8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 黒背景 -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- グラデーション吹き出し -->
  <ellipse cx="160" cy="100" rx="75" ry="60" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 吹き出しの尾 -->
  <path d="M 120 155 L 100 210 L 155 180 Z" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 「防」の文字（白、楷書） -->
  <text x="160" y="108" font-size="75" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="serif">防</text>

  <!-- ピクトグラム風の走る人（白） -->

  <!-- 頭（円） -->
  <circle cx="300" cy="240" r="26" fill="white" opacity="0.95" stroke="none"/>

  <!-- 体（楕円・丸み） -->
  <ellipse cx="300" cy="310" rx="28" ry="40" fill="white" opacity="0.95" stroke="none"/>

  <!-- 左腕（上に引き上げて走る動き） -->
  <line x1="285" y1="280" x2="250" y2="230" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 右腕（下に引いて走る動き） -->
  <line x1="315" y1="280" x2="350" y2="330" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 左脚（上に引き上げ、走る動き） -->
  <line x1="290" y1="350" x2="270" y2="420" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 右脚（後ろに蹴り出す、走る動き） -->
  <line x1="310" y1="350" x2="340" y2="400" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
</svg>