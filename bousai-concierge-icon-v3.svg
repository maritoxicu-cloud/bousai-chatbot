<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E088C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9FE8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 黒背景 -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- グラデーション吹き出し -->
  <ellipse cx="150" cy="100" rx="75" ry="60" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 吹き出しの尾 -->
  <path d="M 110 155 L 90 210 L 145 180 Z" fill="url(#bubbleGradient)" stroke="none"/>

  <!-- 「防」の文字（白、楷書） -->
  <text x="150" y="108" font-size="75" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="serif">防</text>

  <!-- ピクトグラム風の走る人（右に走る） -->

  <!-- 頭（円） -->
  <circle cx="310" cy="230" r="26" fill="white" opacity="0.95" stroke="none"/>

  <!-- 体（楕円・丸み） -->
  <ellipse cx="310" cy="305" rx="28" ry="42" fill="white" opacity="0.95" stroke="none"/>

  <!-- 左腕（前に伸びて、肘が上に曲がる） -->
  <!-- 左肩から肘まで -->
  <line x1="280" y1="280" x2="360" y2="250" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
  <!-- 肘から手まで（上に曲がる） -->
  <line x1="360" y1="250" x2="385" y2="220" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 右腕（後ろに伸びて、肘から下に曲がる） -->
  <!-- 右肩から肘まで -->
  <line x1="340" y1="280" x2="260" y2="310" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
  <!-- 肘から手まで（下に曲がる） -->
  <line x1="260" y1="310" x2="240" y2="360" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 右脚（前に伸びる） -->
  <line x1="325" y1="347" x2="360" y2="430" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>

  <!-- 左脚（斜め後ろに伸びて、膝から真後ろに曲がる） -->
  <!-- 腰から膝まで（斜め後ろ） -->
  <line x1="295" y1="347" x2="260" y2="395" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
  <!-- 膝から足首まで（真後ろ） -->
  <line x1="260" y1="395" x2="220" y2="415" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.95"/>
</svg>